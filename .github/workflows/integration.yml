name: Dashboard & Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Verify dashboard HTML is valid
  dashboard:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check HTML exists
      run: test -f dashboard/index.html
    
    - name: Validate HTML structure
      run: |
        grep -q "<!DOCTYPE html>" dashboard/index.html
        grep -q "</html>" dashboard/index.html

  # Start server and run integration tests
  integration:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build server
      run: cd state-engine && cargo build --release
    
    - name: Start server
      run: |
        cd state-engine
        nohup cargo run --release -- serve --database test.db > server.log 2>&1 &
        echo "Waiting for server to start..."
        for i in {1..30}; do
          if curl -s http://127.0.0.1:3030 > /dev/null 2>&1; then
            echo "Server is ready!"
            exit 0
          fi
          sleep 2
        done
        echo "Server failed to start"
        cat server.log
        exit 1
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Run auto-key test
      run: |
        cd tests/auto-key-test
        npm install
        npm test
