name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Check formatting
      run: cd state-engine && cargo fmt --check
      
    - name: Build
      run: cd state-engine && cargo build --release
      
    - name: Run tests
      run: cd state-engine && cargo test
